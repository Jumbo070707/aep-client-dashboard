<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }

    ::selection { background: #006EF5; color: #fff; }
    input::placeholder, textarea::placeholder { color: #4A4A4A; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

</head>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ══════════════════════════════════════════════════════════════════
       CONSTANTS & CONFIG
       ══════════════════════════════════════════════════════════════════ */

    const STORAGE_KEY = 'aep-dashboard-v1';
    const CONFIG_KEY = 'aep-dashboard-config-v1';

    const DEFAULT_ENGAGEMENT_TYPES = ['AEP Implementation', 'AEP Optimization', 'Migration'];

    const PHASES = ['Discovery', 'Design', 'Build', 'UAT', 'Hypercare', 'Go-Live', 'Optimization'];

    /* User-extensible config (engagement types, etc.) */

      try {
        const stored = localStorage.getItem(CONFIG_KEY);
        if (stored) return JSON.parse(stored);
      } catch {}
      return { engagementTypes: DEFAULT_ENGAGEMENT_TYPES };
    };

    const AEP_COMPONENTS = [

    const ROLES = [

    const DEFAULT_SOLUTION_SECTIONS = [

    /* ── BAiCi Theme ──────────────────────────────────────────────── */

      surface: '#1A1A1A',
      surfaceAlt: '#222222',
      card: '#052777',

    const healthColor = (status) => {
      switch (status) {
        case 'On Track': return THEME.success;
        case 'At Risk': return '#F5A623';

    /* ── Seed Data ────────────────────────────────────────────────── */

        },

          { id: 't2', text: 'Schedule identity resolution workshop', priority: 'high', done: false, dueDate: '2026-03-21', createdAt: Date.now() - 86400000 * 2 },

      {

        timeline: [

        solutionDesign: {

          journeys: 'Next-Best-Action Offer Flow, Retirement Milestone Triggers',
          destinations: 'Adobe Target (on-site personalization), Internal CRM',
          dataSources: 'Authenticated Web, Account Management System, Financial Planning Tool',
          architectureNotes: 'All PII must stay within their Fidelity-managed AEP sandbox. Offer Decisioning models run against anonymized profile attributes only. Data residency: US-East. Identity: Auth_ID as primary namespace, hashed email for cross-channel.',
        },
        architectureDiagrams: [],
        risks: 'Compliance review pending on PII handling for Offer Decisioning. Identity resolution at 62% vs 80% target.',
        nextActions: 'Deliver revised identity resolution architecture. Prep compliance documentation for Offer Decisioning data flows.',
        notes: '',
        todos: [
          { id: 't6', text: 'Deliver revised identity resolution architecture doc', priority: 'high', done: false, dueDate: '2026-03-24', createdAt: Date.now() - 86400000 },
          { id: 't7', text: 'Prep compliance documentation for Offer Decisioning', priority: 'high', done: false, dueDate: '2026-03-28', createdAt: Date.now() - 86400000 * 2 },
          { id: 't8', text: 'Review CJA dashboard mockups with analytics team', priority: 'medium', done: false, dueDate: '2026-03-26', createdAt: Date.now() },
        ],
        updatedAt: Date.now() - 1000 * 60 * 60 * 3,
        createdAt: Date.now() - 1000 * 60 * 60 * 24 * 30,
      },
    ];

    /* ══════════════════════════════════════════════════════════════════
       UTILITY FUNCTIONS
       ══════════════════════════════════════════════════════════════════ */

    const emptyAccount = () => ({
      id: crypto.randomUUID(),
      name: '',
      vertical: '',
      engagementType: 'AEP Implementation',
      health: 'On Track',
      currentPhase: 'Discovery',
      scopeSummary: '',
      componentsInScope: [],
      timeline: [
        { phase: 'Discovery', startDate: '', endDate: '', status: 'Upcoming' },
        { phase: 'Design', startDate: '', endDate: '', status: 'Upcoming' },
        { phase: 'Build', startDate: '', endDate: '', status: 'Upcoming' },
        { phase: 'UAT', startDate: '', endDate: '', status: 'Upcoming' },
        { phase: 'Go-Live', startDate: '', endDate: '', status: 'Upcoming' },
      ],
      resources: [],
      solutionDesign: { schemas: '', datasets: '', audiences: '', journeys: '', destinations: '', dataSources: '', architectureNotes: '' },
      architectureDiagrams: [],
      risks: '',
      nextActions: '',
      notes: '',
      todos: [],
      updatedAt: Date.now(),
      createdAt: Date.now(),
    });

    const formatDate = (d) => {
      if (!d) return '';
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    };

    const formatTimestamp = (ts) => {
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days < 7) return `${days}d ago`;
      return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    };

    /* ══════════════════════════════════════════════════════════════════
       DOCUMENT PARSER — extracts AEP account fields from free text
       ══════════════════════════════════════════════════════════════════ */

    const COMPONENT_KEYWORDS = {
      'Real-Time CDP': [/real[- ]?time\s*cdp/i, /rt[- ]?cdp/i, /customer\s*data\s*platform/i],
      'Journey Optimizer (AJO)': [/journey\s*optimi[sz]er/i, /\bajo\b/i],
      'Customer Journey Analytics (CJA)': [/customer\s*journey\s*analytics/i, /\bcja\b/i],
      'Offer Decisioning': [/offer\s*decisioning/i, /decision\s*management/i, /ode/i],
      'Data Collection / Web SDK': [/web\s*sdk/i, /data\s*collection/i, /alloy/i, /edge\s*network/i],
      'Mobile SDK': [/mobile\s*sdk/i, /aep\s*edge.*mobile/i],
      'Destinations': [/destinations?\b/i],
      'Identity Service': [/identity\s*(service|resolution|graph|stitching)/i, /ecid/i, /namespace/i],
      'Data Hygiene': [/data\s*hygiene/i, /data\s*lifecycle/i],
      'Federated Audience Composition': [/federated\s*audience/i, /fac\b/i],
      'Adobe Target': [/adobe\s*target/i, /\btarget\b.*personali/i],
      'Marketo Engage': [/marketo/i],
    };

    const ROLE_KEYWORDS = {
      'Solution Architect': [/solution\s*architect/i, /\bsa\b/i],
      'Technical Lead': [/technical?\s*lead/i, /tech\s*lead/i],
      'Data Engineer': [/data\s*engineer/i],
      'Implementation Consultant': [/implementation\s*consultant/i, /impl?\s*consultant/i],
      'Project Manager': [/project\s*manager/i, /\bpm\b/i, /program\s*manager/i],
      'Analytics Engineer': [/analytics?\s*engineer/i],
      'QA Engineer': [/qa\s*engineer/i, /quality\s*assurance/i],
      'Client Lead / Sponsor': [/client\s*(lead|sponsor)/i, /executive\s*sponsor/i, /account\s*lead/i],
    };

    const VERTICAL_KEYWORDS = {
      'Retail': [/\bretail\b/i, /e[- ]?commerce/i, /merchandis/i],
      'Financial Services': [/financ/i, /banking/i, /wealth/i, /insurance/i, /finserv/i],
      'Healthcare': [/health\s*care/i, /healthcare/i, /pharma/i, /medical/i],
      'Technology': [/\btech\b/i, /software/i, /saas\b/i],
      'Media & Entertainment': [/media/i, /entertainment/i, /streaming/i, /broadcast/i],
      'Telecom': [/telecom/i, /wireless/i, /mobile\s*operator/i],
      'Travel & Hospitality': [/travel/i, /hospitality/i, /hotel/i, /airline/i],
      'Manufacturing': [/manufactur/i, /industrial/i],
      'Automotive': [/automotive/i, /vehicle/i],
      'Education': [/education/i, /university/i, /academic/i],
    };

    const DATE_PATTERNS = [
      /(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/,   // 2026-03-15
      /(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/,    // 03/15/2026
      /(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\.?\s+(\d{1,2}),?\s*(\d{4})/i,  // March 15, 2026
      /(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\.?\s+(\d{4})/i,     // 15 March 2026
    ];

    const MONTH_MAP = { jan: '01', feb: '02', mar: '03', apr: '04', may: '05', jun: '06', jul: '07', aug: '08', sep: '09', oct: '10', nov: '11', dec: '12' };

    function parseDate(str) {
      if (!str) return '';
      for (const pat of DATE_PATTERNS) {
        const m = str.match(pat);
        if (m) {
          if (/^\d{4}$/.test(m[1])) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
          if (/^\d{4}$/.test(m[3]) && /^\d{1,2}$/.test(m[1])) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
          if (/^[a-z]/i.test(m[1])) return `${m[3]}-${MONTH_MAP[m[1].slice(0,3).toLowerCase()]}-${m[2].padStart(2,'0')}`;
          if (/^[a-z]/i.test(m[2])) return `${m[3]}-${MONTH_MAP[m[2].slice(0,3).toLowerCase()]}-${m[1].padStart(2,'0')}`;
        }
      }
      return '';
    }

    function extractDatesNear(text, keyword) {
      const lines = text.split('\n');
      const dates = [];
      for (let i = 0; i < lines.length; i++) {
        if (new RegExp(keyword, 'i').test(lines[i])) {
          const window = lines.slice(Math.max(0, i - 1), i + 3).join(' ');
          for (const pat of DATE_PATTERNS) {
            const matches = window.matchAll(new RegExp(pat, 'gi'));
            for (const m of matches) dates.push(parseDate(m[0]));
          }
        }
      }
      return dates.filter(Boolean);
    }

    function parseDocument(text) {
      const result = {
        name: '',
        vertical: '',
        engagementType: '',
        scopeSummary: '',
        componentsInScope: [],
        timeline: [],
        resources: [],
        solutionDesign: { schemas: '', datasets: '', audiences: '', journeys: '', destinations: '', dataSources: '', architectureNotes: '' },
        risks: '',
        confidence: {},
      };

      const lower = text.toLowerCase();

      // --- Engagement type ---
      if (/implementation/i.test(text) && /aep|adobe\s*experience\s*platform/i.test(text)) {
        result.engagementType = 'AEP Implementation';
        result.confidence.engagementType = 'high';
      } else if (/optimi[sz]ation/i.test(text) && /aep|adobe\s*experience\s*platform/i.test(text)) {
        result.engagementType = 'AEP Optimization';
        result.confidence.engagementType = 'high';
      } else if (/migration/i.test(text)) {
        result.engagementType = 'Migration';
        result.confidence.engagementType = 'medium';
      }

      // --- Components in scope ---
      for (const [comp, patterns] of Object.entries(COMPONENT_KEYWORDS)) {
        if (patterns.some(p => p.test(text))) {
          result.componentsInScope.push(comp);
        }
      }

      // --- Vertical ---
      for (const [vert, patterns] of Object.entries(VERTICAL_KEYWORDS)) {
        if (patterns.some(p => p.test(text))) {
          result.vertical = vert;
          break;
        }
      }

      // --- Resources ---
      const textLines = text.split('\n');
      for (const [role, patterns] of Object.entries(ROLE_KEYWORDS)) {
        let found = false;
        for (const pat of patterns) {
          for (const line of textLines) {
            if (!pat.test(line)) continue;
            // Match "Role: Name" or "Name - Role" on this single line
            const afterColon = line.match(new RegExp(`${pat.source}\\s*[–\\-—:]\\s*(.+)`, 'i'));
            const beforeColon = line.match(new RegExp(`(.+?)\\s*[–\\-—:]\\s*${pat.source}`, 'i'));
            const name = ((afterColon && afterColon[1]) || (beforeColon && beforeColon[1]) || '').trim().replace(/^[\-\*•]\s*/, '');
            result.resources.push({ role, name: name.length > 2 && name.length < 35 ? name : '', allocation: '' });
            found = true;
            break;
          }
          if (found) break;
        }
      }

      // --- Timeline phases ---
      for (const phase of PHASES) {
        const dates = extractDatesNear(text, phase);
        if (dates.length >= 2) {
          result.timeline.push({ phase, startDate: dates[0], endDate: dates[1], status: 'Upcoming' });
        } else if (dates.length === 1) {
          result.timeline.push({ phase, startDate: dates[0], endDate: '', status: 'Upcoming' });
        }
      }

      // --- Solution design extraction ---
      const extractSection = (keywords) => {
        const lines = text.split('\n');
        for (let i = 0; i < lines.length; i++) {
          if (keywords.some(k => new RegExp(k, 'i').test(lines[i]))) {
            const content = [];
            for (let j = i + 1; j < Math.min(i + 8, lines.length); j++) {
              const line = lines[j].trim();
              if (!line) break;
              if (/^(#{1,3}\s|[A-Z][A-Z\s]{3,}:)/.test(line)) break;
              content.push(line.replace(/^[\-\*•]\s*/, ''));
            }
            if (content.length) return content.join(', ');
            // Check same line after colon
            const m = lines[i].match(/:\s*(.+)/);
            if (m) return m[1].trim();
          }
        }
        return '';
      };

      result.solutionDesign.schemas = extractSection(['xdm\\s*schema', 'schemas?\\b']);
      result.solutionDesign.datasets = extractSection(['datasets?\\b']);
      result.solutionDesign.audiences = extractSection(['audiences?\\b', 'segments?\\b']);
      result.solutionDesign.journeys = extractSection(['journeys?\\b', 'use\\s*cases?\\b']);
      result.solutionDesign.destinations = extractSection(['destinations?\\b', 'activation\\s*channels?']);
      result.solutionDesign.dataSources = extractSection(['data\\s*sources?', 'source\\s*systems?', 'ingestion']);

      // --- Scope summary: look for executive summary or scope section ---
      const scopeText = extractSection(['scope\\b', 'executive\\s*summary', 'overview', 'objective']);
      if (scopeText) result.scopeSummary = scopeText;

      // --- Risks ---
      result.risks = extractSection(['risks?\\b', 'issues?\\b', 'blockers?', 'dependencies', 'concerns?']);

      // --- Client name: look for common patterns ---
      const namePatterns = [
        /(?:client|account|customer|company)\s*(?:name)?\s*[:\-–]\s*([^\n,]{2,40})/i,
        /(?:prepared\s+for|statement\s+of\s+work\s+for|sow\s+for)\s*[:\-–]?\s*([^\n,]{2,40})/i,
      ];
      for (const np of namePatterns) {
        const m = text.match(np);
        if (m) { result.name = m[1].trim(); break; }
      }

      return result;
    }

    /* ══════════════════════════════════════════════════════════════════
       COMPONENTS
       ══════════════════════════════════════════════════════════════════ */

    /* ── Health Indicator Dot ─────────────────────────────────────── */
    function HealthDot({ status, size = 8 }) {
      return (
        <span style={{
          display: 'inline-block', width: size, height: size, borderRadius: '50%',
          background: healthColor(status), flexShrink: 0,
          boxShadow: `0 0 ${size}px ${healthColor(status)}40`,
        }} />
      );
    }

    /* ── Section Header ──────────────────────────────────────────── */
    function SectionHeader({ title, children }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <h3 style={{ fontWeight: 700, fontSize: 11, letterSpacing: '0.12em', color: THEME.textMuted, textTransform: 'uppercase' }}>{title}</h3>
          {children}
        </div>
      );
    }

    /* ── Component Tag ───────────────────────────────────────────── */
    function ComponentTag({ label, active, onClick }) {
      return (
        <button onClick={onClick} style={{
          fontFamily: 'Inter, sans-serif', fontWeight: 500, fontSize: 10, letterSpacing: '0.04em',
          padding: '4px 10px', borderRadius: 3, cursor: 'pointer', transition: 'all 0.15s',
          background: active ? THEME.primary + '25' : 'transparent',
          color: active ? THEME.accent : THEME.textMuted,
          border: `1px solid ${active ? THEME.primary : THEME.border}`,
        }}>
          {label}
        </button>
      );
    }

    /* ── Timeline Row ────────────────────────────────────────────── */
    function TimelineBar({ milestones }) {
      if (!milestones || milestones.length === 0) return null;

      const statusColor = (s) => {
        switch(s) {
          case 'Complete': return THEME.success;
          case 'In Progress': return THEME.primary;
          case 'Upcoming': return THEME.border;
          case 'Delayed': return THEME.error;
          default: return THEME.border;
        }
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {milestones.map((m, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ width: 80, fontSize: 11, fontWeight: 500, color: THEME.textSecondary, flexShrink: 0 }}>{m.phase}</span>
              <div style={{ flex: 1, height: 6, background: THEME.surfaceAlt, borderRadius: 3, overflow: 'hidden' }}>
                <div style={{
                  height: '100%', borderRadius: 3,
                  width: m.status === 'Complete' ? '100%' : m.status === 'In Progress' ? '50%' : '0%',
                  background: statusColor(m.status),
                  transition: 'width 0.3s ease',
                }} />
              </div>
              <span style={{ fontSize: 10, color: THEME.textMuted, width: 120, textAlign: 'right', flexShrink: 0 }}>
                {formatDate(m.startDate)}{m.endDate ? ` - ${formatDate(m.endDate)}` : ''}
              </span>
              <span style={{
                fontSize: 9, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase',
                color: statusColor(m.status), width: 70, textAlign: 'right', flexShrink: 0,
              }}>
                {m.status}
              </span>
            </div>
          ))}
        </div>
      );
    }

    /* ── Resource Table ───────────────────────────────────────────── */
    function ResourceTable({ resources }) {
      if (!resources || resources.length === 0) {
        return <p style={{ fontSize: 12, color: THEME.textMuted, fontStyle: 'italic' }}>No resources assigned yet.</p>;
      }
      return (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 80px', gap: '4px 12px' }}>
          <span style={styles.tableHeader}>Role</span>
          <span style={styles.tableHeader}>Name</span>
          <span style={styles.tableHeader}>Allocation</span>
          {resources.map((r, i) => (
            <React.Fragment key={i}>
              <span style={{ fontSize: 12, color: THEME.textSecondary }}>{r.role}</span>
              <span style={{ fontSize: 12, color: r.name ? THEME.text : THEME.textMuted }}>{r.name || 'TBD'}</span>
              <span style={{ fontSize: 12, color: THEME.accent, fontWeight: 500 }}>{r.allocation}</span>
            </React.Fragment>
          ))}
        </div>
      );
    }

    /* ── Solution Design Grid ────────────────────────────────────── */
    function SolutionDesignGrid({ design, diagrams }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            {DEFAULT_SOLUTION_SECTIONS.filter(s => s.key !== 'architectureNotes').map(cat => (
              <div key={cat.key} style={{ background: THEME.surfaceAlt, borderRadius: 4, padding: '10px 12px', border: `1px solid ${THEME.border}` }}>
                <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.08em', color: THEME.accent, textTransform: 'uppercase', display: 'block', marginBottom: 6 }}>
                  {cat.label}
                </span>
                <p style={{ fontSize: 12, color: design[cat.key] ? THEME.textSecondary : THEME.textMuted, lineHeight: 1.5, fontStyle: design[cat.key] ? 'normal' : 'italic', whiteSpace: 'pre-wrap' }}>
                  {design[cat.key] || 'Not defined'}
                </p>
              </div>
            ))}
          </div>

          {/* Architecture Notes — full width */}
          <div style={{ background: THEME.surfaceAlt, borderRadius: 4, padding: '12px 14px', border: `1px solid ${THEME.primary}30` }}>
            <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.08em', color: THEME.primary, textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>
              Architecture Notes
            </span>
            <p style={{ fontSize: 12, color: design.architectureNotes ? THEME.textSecondary : THEME.textMuted, lineHeight: 1.7, whiteSpace: 'pre-wrap', fontStyle: design.architectureNotes ? 'normal' : 'italic' }}>
              {design.architectureNotes || 'No architecture notes yet. Add implementation details, identity namespace config, data flow notes, etc.'}
            </p>
          </div>

          {/* Architecture Diagrams */}
          <div>
            <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.08em', color: THEME.accent, textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>
              Architecture Diagrams & References
            </span>
            {diagrams && diagrams.length > 0 ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {diagrams.map((d, i) => (
                  <div key={i} style={{ background: THEME.surfaceAlt, borderRadius: 4, padding: '10px 12px', border: `1px solid ${THEME.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <span style={{ fontSize: 13, fontWeight: 500, color: THEME.text, display: 'block' }}>{d.name}</span>
                      {d.description && <span style={{ fontSize: 11, color: THEME.textMuted }}>{d.description}</span>}
                    </div>
                    {d.url && (
                      <a href={d.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: 10, color: THEME.primary, textDecoration: 'none', fontWeight: 500, padding: '4px 8px', border: `1px solid ${THEME.primary}`, borderRadius: 3 }}>
                        Open
                      </a>
                    )}
                  </div>
                ))}
              </div>
            ) : (
              <p style={{ fontSize: 12, color: THEME.textMuted, fontStyle: 'italic' }}>No diagrams linked. Add references to Lucidchart, Figma, Confluence, etc.</p>
            )}
          </div>
        </div>
      );
    }

    /* ── Account Todo List ─────────────────────────────────────────── */
    const PRIORITIES = ['high', 'medium', 'low'];
    const priorityColor = (p) => p === 'high' ? THEME.error : p === 'medium' ? '#F5A623' : THEME.textMuted;

    function AccountTodoList({ todos = [], onUpdate }) {
      const [newText, setNewText] = useState('');
      const [newPriority, setNewPriority] = useState('medium');
      const [newDueDate, setNewDueDate] = useState('');
      const [showCompleted, setShowCompleted] = useState(false);

      const addTodo = () => {
        if (!newText.trim()) return;
        const todo = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
          text: newText.trim(),
          priority: newPriority,
          done: false,
          dueDate: newDueDate,
          createdAt: Date.now(),
        };
        onUpdate([todo, ...todos]);
        setNewText('');
        setNewDueDate('');
      };

      const toggleDone = (id) => {
        onUpdate(todos.map(t => t.id === id ? { ...t, done: !t.done } : t));
      };

      const removeTodo = (id) => {
        onUpdate(todos.filter(t => t.id !== id));
      };

      const active = todos.filter(t => !t.done).sort((a, b) => {
        const pi = { high: 0, medium: 1, low: 2 };
        if (pi[a.priority] !== pi[b.priority]) return pi[a.priority] - pi[b.priority];
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return b.createdAt - a.createdAt;
      });
      const completed = todos.filter(t => t.done);

      const isOverdue = (d) => d && new Date(d + 'T23:59:59') < new Date();
      const isDueSoon = (d) => {
        if (!d) return false;
        const due = new Date(d + 'T23:59:59');
        const now = new Date();
        const diff = (due - now) / 86400000;
        return diff >= 0 && diff <= 2;
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {/* Add new todo */}
          <div style={{ display: 'flex', gap: 6, alignItems: 'flex-end' }}>
            <div style={{ flex: 1 }}>
              <input
                value={newText}
                onChange={e => setNewText(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addTodo()}
                style={{ ...styles.input, marginBottom: 0 }}
                placeholder="Add a to-do item..."
              />
            </div>
            <select value={newPriority} onChange={e => setNewPriority(e.target.value)} style={{ ...styles.select, height: 34 }}>
              {PRIORITIES.map(p => <option key={p} value={p}>{p.charAt(0).toUpperCase() + p.slice(1)}</option>)}
            </select>
            <input type="date" value={newDueDate} onChange={e => setNewDueDate(e.target.value)}
              style={{ ...styles.input, width: 130, marginBottom: 0, colorScheme: 'dark' }} />
            <button onClick={addTodo} style={{ ...styles.smallBtn, background: THEME.primary, height: 34, padding: '0 14px' }}>Add</button>
          </div>

          {/* Active todos */}
          {active.length === 0 && completed.length === 0 && (
            <p style={{ fontSize: 12, color: THEME.textMuted, fontStyle: 'italic', textAlign: 'center', padding: 20 }}>
              No to-do items yet. Add tasks to track what needs to be done for this account.
            </p>
          )}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {active.map(t => (
              <div key={t.id} style={{
                display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px',
                background: THEME.surfaceAlt, borderRadius: 4,
                borderLeft: `3px solid ${priorityColor(t.priority)}`,
                border: `1px solid ${THEME.border}`,
                borderLeftColor: priorityColor(t.priority), borderLeftWidth: 3,
              }}>
                <button onClick={() => toggleDone(t.id)} style={{
                  width: 18, height: 18, borderRadius: 3, border: `2px solid ${THEME.border}`,
                  background: 'transparent', cursor: 'pointer', flexShrink: 0,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }} />
                <span style={{ flex: 1, fontSize: 12, color: THEME.text }}>{t.text}</span>
                {t.dueDate && (
                  <span style={{
                    fontSize: 10, fontWeight: 500, flexShrink: 0, padding: '2px 6px', borderRadius: 3,
                    color: isOverdue(t.dueDate) ? THEME.error : isDueSoon(t.dueDate) ? '#F5A623' : THEME.textMuted,
                    background: isOverdue(t.dueDate) ? THEME.error + '15' : isDueSoon(t.dueDate) ? '#F5A62315' : 'transparent',
                  }}>
                    {formatDate(t.dueDate)}
                  </span>
                )}
                <span style={{ fontSize: 9, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em', color: priorityColor(t.priority), flexShrink: 0 }}>
                  {t.priority}
                </span>
                <button onClick={() => removeTodo(t.id)} style={{ ...styles.iconBtn, fontSize: 12, color: THEME.textMuted }}>✕</button>
              </div>
            ))}
          </div>

          {/* Completed toggle */}
          {completed.length > 0 && (
            <div>
              <button onClick={() => setShowCompleted(!showCompleted)} style={{
                background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'Inter, sans-serif',
                fontSize: 10, fontWeight: 500, color: THEME.textMuted, letterSpacing: '0.04em', padding: '4px 0',
              }}>
                {showCompleted ? '▾' : '▸'} {completed.length} completed
              </button>
              {showCompleted && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 3, marginTop: 4 }}>
                  {completed.map(t => (
                    <div key={t.id} style={{
                      display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px',
                      background: THEME.surface, borderRadius: 4, opacity: 0.6,
                    }}>
                      <button onClick={() => toggleDone(t.id)} style={{
                        width: 18, height: 18, borderRadius: 3, border: `2px solid ${THEME.success}`,
                        background: THEME.success + '30', cursor: 'pointer', flexShrink: 0,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        color: THEME.success, fontSize: 11, fontWeight: 700,
                      }}>✓</button>
                      <span style={{ flex: 1, fontSize: 12, color: THEME.textMuted, textDecoration: 'line-through' }}>{t.text}</span>
                      <button onClick={() => removeTodo(t.id)} style={{ ...styles.iconBtn, fontSize: 12, color: THEME.textMuted }}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════
       AGGREGATE TODO VIEW — shows all todos across accounts
       ══════════════════════════════════════════════════════════════════ */
    function AggregateTodoView({ accounts, onSelectAccount }) {
      const allTodos = useMemo(() => {
        const items = [];
        accounts.forEach(acct => {
          (acct.todos || []).forEach(t => {
            items.push({ ...t, accountId: acct.id, accountName: acct.name, accountHealth: acct.health });
          });
        });
        return items;
      }, [accounts]);

      const active = allTodos.filter(t => !t.done).sort((a, b) => {
        const pi = { high: 0, medium: 1, low: 2 };
        if (pi[a.priority] !== pi[b.priority]) return pi[a.priority] - pi[b.priority];
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return b.createdAt - a.createdAt;
      });

      const overdue = active.filter(t => t.dueDate && new Date(t.dueDate + 'T23:59:59') < new Date());
      const dueSoon = active.filter(t => {
        if (!t.dueDate) return false;
        const due = new Date(t.dueDate + 'T23:59:59');
        const diff = (due - new Date()) / 86400000;
        return diff >= 0 && diff <= 3;
      });
      const highPriority = active.filter(t => t.priority === 'high');

      const isOverdue = (d) => d && new Date(d + 'T23:59:59') < new Date();
      const isDueSoon = (d) => {
        if (!d) return false;
        const due = new Date(d + 'T23:59:59');
        const diff = (due - new Date()) / 86400000;
        return diff >= 0 && diff <= 2;
      };

      // Group by account
      const byAccount = {};
      active.forEach(t => {
        if (!byAccount[t.accountId]) byAccount[t.accountId] = { name: t.accountName, health: t.accountHealth, todos: [] };
        byAccount[t.accountId].todos.push(t);
      });

      return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '24px 32px', overflow: 'hidden' }}>
          {/* Header */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
              <div style={{ width: 4, height: 20, background: THEME.primary, borderRadius: 2 }} />
              <h2 style={{ fontSize: 15, fontWeight: 800, letterSpacing: '0.12em', textTransform: 'uppercase', color: THEME.text }}>
                Action Center
              </h2>
            </div>
            <span style={{ fontSize: 11, color: THEME.textMuted, marginLeft: 12 }}>
              {active.length} open task{active.length !== 1 ? 's' : ''} across {accounts.length} account{accounts.length !== 1 ? 's' : ''}
            </span>
          </div>

          {/* Summary cards */}
          <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
            {[
              { label: 'Overdue', count: overdue.length, color: THEME.error },
              { label: 'Due Soon', count: dueSoon.length, color: '#F5A623' },
              { label: 'High Priority', count: highPriority.length, color: THEME.error },
              { label: 'Total Open', count: active.length, color: THEME.primary },
            ].map(s => (
              <div key={s.label} style={{
                flex: 1, background: THEME.surfaceAlt, borderRadius: 4, padding: '12px 14px',
                border: `1px solid ${s.count > 0 ? s.color + '40' : THEME.border}`,
              }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: s.count > 0 ? s.color : THEME.textMuted }}>{s.count}</div>
                <div style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: THEME.textMuted, marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Scrollable todo list grouped by account */}
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {active.length === 0 ? (
              <div style={{ textAlign: 'center', padding: 40, color: THEME.textMuted }}>
                <p style={{ fontSize: 14, fontWeight: 500, marginBottom: 8 }}>All clear!</p>
                <p style={{ fontSize: 12 }}>No open tasks across your accounts. Add to-dos from each account's Actions tab.</p>
              </div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {Object.entries(byAccount).map(([accountId, group]) => (
                  <div key={accountId}>
                    <button onClick={() => onSelectAccount(accountId)} style={{
                      background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'Inter, sans-serif',
                      display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8, padding: 0,
                    }}>
                      <HealthDot status={group.health} size={7} />
                      <span style={{ fontSize: 12, fontWeight: 600, color: THEME.text, letterSpacing: '0.04em' }}>{group.name}</span>
                      <span style={{ fontSize: 10, color: THEME.textMuted }}>({group.todos.length})</span>
                      <span style={{ fontSize: 10, color: THEME.primary }}>→</span>
                    </button>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 3, paddingLeft: 14 }}>
                      {group.todos.map(t => (
                        <div key={t.id} style={{
                          display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px',
                          background: THEME.surfaceAlt, borderRadius: 4,
                          borderLeft: `3px solid ${priorityColor(t.priority)}`,
                        }}>
                          <span style={{ flex: 1, fontSize: 12, color: THEME.text }}>{t.text}</span>
                          {t.dueDate && (
                            <span style={{
                              fontSize: 10, fontWeight: 500, flexShrink: 0, padding: '2px 6px', borderRadius: 3,
                              color: isOverdue(t.dueDate) ? THEME.error : isDueSoon(t.dueDate) ? '#F5A623' : THEME.textMuted,
                              background: isOverdue(t.dueDate) ? THEME.error + '15' : isDueSoon(t.dueDate) ? '#F5A62315' : 'transparent',
                            }}>
                              {formatDate(t.dueDate)}
                            </span>
                          )}
                          <span style={{ fontSize: 9, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em', color: priorityColor(t.priority), flexShrink: 0 }}>
                            {t.priority}
                          </span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Quick Stats Footer */}
          <div style={{ borderTop: `1px solid ${THEME.border}`, paddingTop: 14, marginTop: 14, display: 'flex', gap: 20 }}>
            {[
              { label: 'Total Accounts', count: accounts.length, color: THEME.text },
              { label: 'At Risk', count: accounts.filter(a => a.health === 'At Risk').length, color: '#F5A623' },
              { label: 'Off Track', count: accounts.filter(a => a.health === 'Off Track').length, color: THEME.error },
              { label: 'On Track', count: accounts.filter(a => a.health === 'On Track').length, color: THEME.success },
            ].map(s => (
              <div key={s.label} style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 18, fontWeight: 700, color: s.color }}>{s.count}</div>
                <div style={{ fontSize: 9, fontWeight: 500, color: THEME.textMuted, letterSpacing: '0.08em', textTransform: 'uppercase', marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════
       ACCOUNT DETAIL PANEL (Right side)
       ══════════════════════════════════════════════════════════════════ */
    function AccountDetail({ account, onUpdate, onDelete, onClose, engagementTypes }) {
      const [activeTab, setActiveTab] = useState('overview');
      const [editing, setEditing] = useState(false);
      const [form, setForm] = useState({ ...account });

      useEffect(() => {
        setForm({ ...account });
        setEditing(false);
      }, [account.id]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const saveChanges = () => {
        onUpdate({ ...form, updatedAt: Date.now() });
        setEditing(false);
      };

      const cancelEdit = () => {
        setForm({ ...account });
        setEditing(false);
      };

      const tabs = [
        { key: 'overview', label: 'Overview' },
        { key: 'actions', label: `Actions${(account.todos || []).filter(t => !t.done).length ? ` (${(account.todos || []).filter(t => !t.done).length})` : ''}` },
        { key: 'scope', label: 'Scope' },
        { key: 'timeline', label: 'Timeline' },
        { key: 'resources', label: 'Resources' },
        { key: 'solution', label: 'Solution Design' },
      ];

      const toggleComponent = (comp) => {
        const current = form.componentsInScope || [];
        if (current.includes(comp)) {
          set('componentsInScope', current.filter(c => c !== comp));
        } else {
          set('componentsInScope', [...current, comp]);
        }
      };

      const updateTimeline = (idx, field, val) => {
        const updated = [...form.timeline];
        updated[idx] = { ...updated[idx], [field]: val };
        set('timeline', updated);
      };

      const addTimelinePhase = () => {
        set('timeline', [...form.timeline, { phase: '', startDate: '', endDate: '', status: 'Upcoming' }]);
      };

      const removeTimelinePhase = (idx) => {
        set('timeline', form.timeline.filter((_, i) => i !== idx));
      };

      const updateResource = (idx, field, val) => {
        const updated = [...form.resources];
        updated[idx] = { ...updated[idx], [field]: val };
        set('resources', updated);
      };

      const addResource = () => {
        set('resources', [...form.resources, { role: '', name: '', allocation: '' }]);
      };

      const removeResource = (idx) => {
        set('resources', form.resources.filter((_, i) => i !== idx));
      };

      const updateSolution = (key, val) => {
        set('solutionDesign', { ...form.solutionDesign, [key]: val });
      };

      const addDiagram = () => {
        set('architectureDiagrams', [...(form.architectureDiagrams || []), { name: '', url: '', description: '' }]);
      };

      const updateDiagram = (idx, field, val) => {
        const updated = [...(form.architectureDiagrams || [])];
        updated[idx] = { ...updated[idx], [field]: val };
        set('architectureDiagrams', updated);
      };

      const removeDiagram = (idx) => {
        set('architectureDiagrams', (form.architectureDiagrams || []).filter((_, i) => i !== idx));
      };

      return (
        <div style={styles.detailPanel}>
          {/* Detail Header */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16, paddingBottom: 14, borderBottom: `1px solid ${THEME.border}` }}>
            <div style={{ flex: 1 }}>
              {editing ? (
                <input value={form.name} onChange={e => set('name', e.target.value)} style={{ ...styles.input, fontSize: 18, fontWeight: 700, marginBottom: 6 }} placeholder="Account Name" />
              ) : (
                <h2 style={{ fontSize: 18, fontWeight: 700, color: THEME.text, marginBottom: 4 }}>{account.name}</h2>
              )}
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                <HealthDot status={editing ? form.health : account.health} />
                {editing ? (
                  <select value={form.health} onChange={e => set('health', e.target.value)} style={styles.select}>
                    {HEALTH_STATUSES.map(h => <option key={h} value={h}>{h}</option>)}
                  </select>
                ) : (
                  <span style={{ fontSize: 11, fontWeight: 600, color: healthColor(account.health), textTransform: 'uppercase', letterSpacing: '0.06em' }}>{account.health}</span>
                )}
                <span style={{ color: THEME.border }}>|</span>
                {editing ? (
                  <select value={form.engagementType} onChange={e => set('engagementType', e.target.value)} style={styles.select}>
                    {engagementTypes.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                ) : (
                  <span style={{ fontSize: 11, color: THEME.textMuted }}>{account.engagementType}</span>

    function NewAccountModal({ onSave, onClose, engagementTypes, onAddEngagementType }) {
      const [form, setForm] = useState(emptyAccount());

      useEffect(() => { nameRef.current?.focus(); }, []);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleSave = () => {
        if (!form.name.trim()) return;
        onSave({ ...form, name: form.name.trim(), updatedAt: Date.now(), createdAt: Date.now() });
      };

      return (
        <div style={styles.overlay} onClick={onClose}>
          <div style={styles.modal} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <span style={{ fontWeight: 700, fontSize: 13, letterSpacing: '0.1em', color: THEME.text }}>NEW ACCOUNT</span>
              <button style={{ background: 'none', border: 'none', color: THEME.textMuted, fontSize: 16, cursor: 'pointer' }} onClick={onClose}>✕</button>

            <label style={styles.label}>Engagement Type</label>
            <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
              <select value={form.engagementType} onChange={e => {
                if (e.target.value === '__custom__') {
                  const custom = prompt('Enter new engagement type:');
                  if (custom && custom.trim()) {
                    onAddEngagementType(custom.trim());
                    set('engagementType', custom.trim());
                  }
                } else {
                  set('engagementType', e.target.value);
                }
              }} style={{ ...styles.select, flex: 1 }}>
                {engagementTypes.map(t => <option key={t} value={t}>{t}</option>)}

            <label style={styles.label}>Health Status</label>

                <button key={h} onClick={() => set('health', h)} style={{
                  fontFamily: 'Inter, sans-serif', fontWeight: 600, fontSize: 10, letterSpacing: '0.06em',
                  padding: '5px 12px', borderRadius: 3, cursor: 'pointer', textTransform: 'uppercase',
                  background: form.health === h ? healthColor(h) + '30' : 'transparent',
                  color: form.health === h ? healthColor(h) : THEME.textMuted,
                  border: `1px solid ${form.health === h ? healthColor(h) : THEME.border}`,

                }}>
                  {h}

            <label style={styles.label}>Current Phase</label>

            </select>

            <label style={styles.label}>Scope Summary</label>
            <textarea value={form.scopeSummary} onChange={e => set('scopeSummary', e.target.value)}

            <div style={{ display: 'flex', gap: 10, marginTop: 20, justifyContent: 'flex-end' }}>

    /* ══════════════════════════════════════════════════════════════════
       IMPORT MODAL — paste text, upload file, or JSON import
       ══════════════════════════════════════════════════════════════════ */
    function ImportModal({ onImport, onClose }) {
      const [mode, setMode] = useState('paste'); // paste | file | json
      const [rawText, setRawText] = useState('');
      const [parsed, setParsed] = useState(null);
      const [fileName, setFileName] = useState('');
      const fileRef = useRef(null);

      const handleParse = () => {
        if (!rawText.trim()) return;
        // Try JSON first
        if (mode === 'json') {
          try {
            const data = JSON.parse(rawText);
            // Support single account object or { accounts: [...] }
            const acct = Array.isArray(data) ? data[0] : data.accounts ? data.accounts[0] : data;
            setParsed({ ...emptyAccount(), ...acct, id: crypto.randomUUID(), updatedAt: Date.now(), createdAt: Date.now(), _source: 'json' });
            return;
          } catch (e) {
            alert('Invalid JSON. Check the format and try again.');
            return;
          }
        }
        const result = parseDocument(rawText);
        // Merge into an empty account template
        const account = {
          ...emptyAccount(),
          name: result.name,
          vertical: result.vertical,
          engagementType: result.engagementType || 'AEP Implementation',
          scopeSummary: result.scopeSummary,
          componentsInScope: result.componentsInScope,
          timeline: result.timeline.length > 0 ? result.timeline : emptyAccount().timeline,
          resources: result.resources,
          solutionDesign: {
            schemas: result.solutionDesign.schemas,
            datasets: result.solutionDesign.datasets,
            audiences: result.solutionDesign.audiences,
            journeys: result.solutionDesign.journeys,
            destinations: result.solutionDesign.destinations,
            dataSources: result.solutionDesign.dataSources,
            architectureNotes: result.solutionDesign.architectureNotes || '',
          },
          risks: result.risks,
          _confidence: result.confidence,
          _source: 'parsed',
        };
        setParsed(account);
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setFileName(file.name);
        const reader = new FileReader();
        reader.onload = (ev) => {
          setRawText(ev.target.result);
        };
        reader.readAsText(file);
      };

      const handleConfirm = () => {
        if (!parsed) return;
        const { _confidence, _source, ...account } = parsed;
        onImport(account);
      };

      const fieldCount = parsed ? [
        parsed.name, parsed.vertical, parsed.engagementType, parsed.scopeSummary,
        parsed.componentsInScope?.length > 0, parsed.timeline?.some(t => t.startDate),
        parsed.resources?.length > 0, parsed.risks,
        ...Object.values(parsed.solutionDesign || {}).map(v => !!v),
      ].filter(Boolean).length : 0;

      const modes = [
        { key: 'paste', label: 'Paste Text' },
        { key: 'file', label: 'Upload File' },
        { key: 'json', label: 'JSON Import' },
      ];

      return (
        <div style={styles.overlay} onClick={onClose}>
          <div style={{ ...styles.modal, maxWidth: parsed ? 700 : 560 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <span style={{ fontWeight: 700, fontSize: 13, letterSpacing: '0.1em', color: THEME.text }}>IMPORT DOCUMENT</span>
              <button style={{ background: 'none', border: 'none', color: THEME.textMuted, fontSize: 16, cursor: 'pointer' }} onClick={onClose}>✕</button>
            </div>

            {/* Mode tabs */}
            <div style={{ display: 'flex', gap: 0, borderBottom: `1px solid ${THEME.border}`, marginBottom: 16 }}>
              {modes.map(m => (
                <button key={m.key} onClick={() => { setMode(m.key); setParsed(null); }} style={{
                  ...styles.tabBtn,
                  color: mode === m.key ? THEME.primary : THEME.textMuted,
                  borderBottom: mode === m.key ? `2px solid ${THEME.primary}` : '2px solid transparent',
                }}>
                  {m.label}
                </button>
              ))}
            </div>

            {!parsed ? (
              <>
                {/* Input area */}
                {mode === 'paste' && (
                  <div>
                    <p style={{ fontSize: 11, color: THEME.textMuted, marginBottom: 8, lineHeight: 1.5 }}>
                      Paste content from a SOW, scope document, project plan, architecture doc, or meeting notes. The parser will extract client details, AEP components, timelines, resources, and solution design elements.
                    </p>
                    <textarea
                      value={rawText}
                      onChange={e => setRawText(e.target.value)}
                      style={{ ...styles.input, minHeight: 200, resize: 'vertical', fontFamily: 'Inter, monospace', fontSize: 12, lineHeight: 1.6 }}
                      placeholder={'Paste document text here...\n\nExample:\nClient: Nordstrom\nEngagement: AEP Implementation\n\nScope:\n- Real-Time CDP deployment\n- Web SDK migration from legacy Analytics\n- Identity resolution across web, mobile, POS\n\nTimeline:\n- Discovery: Jan 6 - Jan 31, 2026\n- Design: Feb 3 - Feb 28, 2026\n...\n\nResources:\n- Solution Architect: Jane Smith\n- Data Engineer: John Doe'}
                    />
                  </div>
                )}

                {mode === 'file' && (
                  <div>
                    <p style={{ fontSize: 11, color: THEME.textMuted, marginBottom: 8, lineHeight: 1.5 }}>
                      Upload a text file (.txt, .md, .csv) or copy of a document. Content will be parsed for AEP account details.
                    </p>
                    <input ref={fileRef} type="file" accept=".txt,.md,.csv,.json,.tsv" onChange={handleFileUpload}
                      style={{ display: 'none' }} />
                    <button onClick={() => fileRef.current?.click()} style={{
                      ...styles.addBtn, width: '100%', background: THEME.surfaceAlt, border: `1px dashed ${THEME.border}`, color: THEME.textSecondary, marginBottom: 12,
                    }}>
                      {fileName ? `Selected: ${fileName}` : 'Choose File...'}
                    </button>
                    {rawText && (
                      <textarea value={rawText} onChange={e => setRawText(e.target.value)}
                        style={{ ...styles.input, minHeight: 150, resize: 'vertical', fontFamily: 'Inter, monospace', fontSize: 11 }} />
                    )}
                  </div>
                )}

                {mode === 'json' && (
                  <div>
                    <p style={{ fontSize: 11, color: THEME.textMuted, marginBottom: 8, lineHeight: 1.5 }}>
                      Paste a JSON object matching the account schema. Useful for exporting/importing between dashboards.
                    </p>
                    <textarea
                      value={rawText}
                      onChange={e => setRawText(e.target.value)}
                      style={{ ...styles.input, minHeight: 200, resize: 'vertical', fontFamily: 'monospace', fontSize: 11, lineHeight: 1.5 }}
                      placeholder={'{\n  "name": "Nordstrom",\n  "vertical": "Retail",\n  "engagementType": "AEP Implementation",\n  "health": "On Track",\n  "currentPhase": "Build",\n  "componentsInScope": ["Real-Time CDP", "Data Collection / Web SDK"],\n  "scopeSummary": "...",\n  ...\n}'}
                    />
                  </div>
                )}

                <div style={{ display: 'flex', gap: 10, marginTop: 16, justifyContent: 'flex-end' }}>
                  <button style={styles.cancelBtn} onClick={onClose}>Cancel</button>
                  <button style={{ ...styles.saveBtn, opacity: rawText.trim() ? 1 : 0.4 }} onClick={handleParse} disabled={!rawText.trim()}>
                    Parse & Preview
                  </button>
                </div>
              </>
            ) : (
              <>
                {/* Preview extracted data */}
                <div style={{ marginBottom: 12 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                    <div style={{ width: 4, height: 16, background: THEME.success, borderRadius: 2 }} />
                    <span style={{ fontSize: 12, fontWeight: 600, color: THEME.text }}>
                      {parsed._source === 'json' ? 'JSON Import' : `Extracted ${fieldCount} fields`}
                    </span>
                    <button onClick={() => setParsed(null)} style={{ fontSize: 10, color: THEME.primary, background: 'none', border: 'none', cursor: 'pointer', marginLeft: 'auto' }}>
                      Back to edit
                    </button>
                  </div>

                  <div style={{ maxHeight: 400, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {/* Editable name */}
                    <div style={styles.previewRow}>
                      <span style={styles.previewLabel}>Account Name</span>
                      <input value={parsed.name} onChange={e => setParsed(p => ({ ...p, name: e.target.value }))}
                        style={{ ...styles.input, marginBottom: 0 }} placeholder="Enter account name" />
                    </div>

                    {/* Vertical */}
                    <div style={styles.previewRow}>
                      <span style={styles.previewLabel}>Vertical</span>
                      <input value={parsed.vertical} onChange={e => setParsed(p => ({ ...p, vertical: e.target.value }))}
                        style={{ ...styles.input, marginBottom: 0 }} placeholder="Industry vertical" />
                    </div>

                    {/* Engagement type */}
                    <div style={styles.previewRow}>
                      <span style={styles.previewLabel}>Engagement Type</span>
                      <span style={{ fontSize: 12, color: THEME.text }}>{parsed.engagementType}</span>
                    </div>

                    {/* Components */}
                    {parsed.componentsInScope?.length > 0 && (
                      <div style={styles.previewRow}>
                        <span style={styles.previewLabel}>Components ({parsed.componentsInScope.length})</span>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                          {parsed.componentsInScope.map(c => (
                            <span key={c} style={{ fontSize: 10, padding: '2px 8px', background: THEME.primary + '25', color: THEME.accent, borderRadius: 3, border: `1px solid ${THEME.primary}` }}>{c}</span>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Scope summary */}
                    {parsed.scopeSummary && (
                      <div style={styles.previewRow}>
                        <span style={styles.previewLabel}>Scope Summary</span>
                        <p style={{ fontSize: 12, color: THEME.textSecondary, lineHeight: 1.5, margin: 0 }}>{parsed.scopeSummary}</p>
                      </div>
                    )}

                    {/* Timeline */}
                    {parsed.timeline?.some(t => t.startDate) && (
                      <div style={styles.previewRow}>
                        <span style={styles.previewLabel}>Timeline ({parsed.timeline.filter(t => t.startDate).length} phases)</span>
                        {parsed.timeline.filter(t => t.startDate).map((t, i) => (
                          <div key={i} style={{ fontSize: 11, color: THEME.textSecondary, display: 'flex', gap: 8 }}>
                            <span style={{ width: 70, fontWeight: 500 }}>{t.phase}</span>
                            <span>{t.startDate}{t.endDate ? ` — ${t.endDate}` : ''}</span>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Resources */}
                    {parsed.resources?.length > 0 && (
                      <div style={styles.previewRow}>
                        <span style={styles.previewLabel}>Resources ({parsed.resources.length})</span>
                        {parsed.resources.map((r, i) => (
                          <div key={i} style={{ fontSize: 11, color: THEME.textSecondary }}>
                            {r.role}{r.name ? `: ${r.name}` : ''}
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Solution design sections */}
                    {Object.entries(parsed.solutionDesign || {}).filter(([k, v]) => v).map(([k, v]) => {
                      const label = DEFAULT_SOLUTION_SECTIONS.find(s => s.key === k)?.label || k;
                      return (
                        <div key={k} style={styles.previewRow}>
                          <span style={styles.previewLabel}>{label}</span>
                          <p style={{ fontSize: 11, color: THEME.textSecondary, margin: 0, lineHeight: 1.4 }}>{v}</p>
                        </div>
                      );
                    })}

                    {/* Risks */}
                    {parsed.risks && (
                      <div style={styles.previewRow}>
                        <span style={styles.previewLabel}>Risks</span>
                        <p style={{ fontSize: 11, color: '#F5A623', margin: 0 }}>{parsed.risks}</p>
                      </div>
                    )}
                  </div>
                </div>

                <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
                  <button style={styles.cancelBtn} onClick={onClose}>Cancel</button>
                  <button style={{ ...styles.saveBtn, opacity: parsed.name?.trim() ? 1 : 0.4 }} onClick={handleConfirm} disabled={!parsed.name?.trim()}>
                    Create Account
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════
       ACCOUNT LIST CARD (Left sidebar)
       ══════════════════════════════════════════════════════════════════ */
    function AccountCard({ account, selected, onClick }) {
      const [hovered, setHovered] = useState(false);
      return (
        <div
          onClick={onClick}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{
            background: selected ? THEME.card : hovered ? THEME.surfaceAlt : THEME.surface,
            border: `1px solid ${selected ? THEME.primary : hovered ? THEME.borderLight : THEME.border}`,
            borderRadius: 5, padding: '12px 14px', cursor: 'pointer',
            transition: 'all 0.15s ease',
            borderLeft: `3px solid ${healthColor(account.health)}`,
          }}
        >
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
            <span style={{ fontWeight: 600, fontSize: 14, color: THEME.text }}>{account.name}</span>
            <HealthDot status={account.health} />
          </div>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: THEME.accent, fontWeight: 500, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{account.vertical}</span>
            <span style={{ color: THEME.border, fontSize: 10 }}>|</span>
            <span style={{ fontSize: 10, color: THEME.textMuted }}>{account.engagementType}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 10, color: THEME.primary, fontWeight: 500 }}>{account.currentPhase}</span>
            <span style={{ fontSize: 9, color: THEME.textMuted }}>{formatTimestamp(account.updatedAt)}</span>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════
       MAIN APP
       ══════════════════════════════════════════════════════════════════ */
    function App() {
      const [accounts, setAccounts] = useState(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) { const parsed = JSON.parse(stored); if (Array.isArray(parsed) && parsed.length) return parsed; }
        } catch {}
        return SEED_DATA;
      });

      const [config, setConfig] = useState(loadConfig);
      const engagementTypes = config.engagementTypes || DEFAULT_ENGAGEMENT_TYPES;

      const addEngagementType = (type) => {
        if (!engagementTypes.includes(type)) {
          const updated = { ...config, engagementTypes: [...engagementTypes, type] };
          setConfig(updated);
          saveConfig(updated);
        }
      };

      const [selectedId, setSelectedId] = useState(null);
      const [showNewModal, setShowNewModal] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [searchTerm, setSearchTerm] = useState('');
      const [filterHealth, setFilterHealth] = useState('All');

      useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts)); }, [accounts]);

      const selectedAccount = useMemo(() => accounts.find(a => a.id === selectedId), [accounts, selectedId]);

      const filtered = useMemo(() => {
        let result = accounts;
        if (filterHealth !== 'All') result = result.filter(a => a.health === filterHealth);
        if (searchTerm) {
          const term = searchTerm.toLowerCase();
          result = result.filter(a =>
            a.name.toLowerCase().includes(term) ||
            a.vertical.toLowerCase().includes(term) ||
            a.engagementType.toLowerCase().includes(term)
          );
        }
        return result.sort((a, b) => {
          const order = { 'Off Track': 0, 'At Risk': 1, 'On Track': 2, 'On Hold': 3, 'Complete': 4 };
          return (order[a.health] ?? 9) - (order[b.health] ?? 9);
        });
      }, [accounts, filterHealth, searchTerm]);

      const addAccount = (acc) => {
        setAccounts(prev => [acc, ...prev]);
        setSelectedId(acc.id);
        setShowNewModal(false);
      };

      const handleImport = (parsed) => {
        const acc = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          name: parsed.name || 'Imported Account',
          vertical: parsed.vertical || '',
          engagementType: parsed.engagementType || engagementTypes[0] || '',
          health: 'On Track',
          currentPhase: 'Discovery',
          scopeSummary: parsed.scopeSummary || '',
          componentsInScope: parsed.componentsInScope || [],
          timeline: parsed.timeline || PHASES.map(p => ({ phase: p, startDate: '', endDate: '', status: 'Not Started' })),
          resources: parsed.resources || [],
          solutionDesign: parsed.solutionDesign || DEFAULT_SOLUTION_SECTIONS.reduce((o, s) => { o[s.key] = ''; return o; }, {}),
          risks: parsed.risks || [],
          nextActions: [],
          todos: [],
          createdAt: new Date().toISOString(),
        };
        setAccounts(prev => [acc, ...prev]);
        setSelectedId(acc.id);
        setShowImportModal(false);
      };

      const updateAccount = (acc) => {
        setAccounts(prev => prev.map(a => a.id === acc.id ? acc : a));
      };

      const deleteAccount = (id) => {
        if (!confirm('Remove this account from the dashboard?')) return;
        setAccounts(prev => prev.filter(a => a.id !== id));
        if (selectedId === id) setSelectedId(null);
      };

      const healthCounts = accounts.reduce((acc, a) => { acc[a.health] = (acc[a.health] || 0) + 1; return acc; }, {});

      return (
        <div style={styles.appRoot}>
          {/* ── Left Sidebar ── */}
          <div style={styles.sidebar}>
            {/* Header */}
            <div style={{ padding: '20px 16px 12px', borderBottom: `1px solid ${THEME.border}` }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 2 }}>
                <div style={{ width: 4, height: 18, background: THEME.primary, borderRadius: 2 }} />
                <h1 style={{ fontWeight: 800, fontSize: 15, letterSpacing: '0.12em', color: THEME.text, textTransform: 'uppercase' }}>
                  AEP Dashboard
                </h1>
              </div>
              <span style={{ fontSize: 10, color: THEME.textMuted, fontWeight: 300, marginLeft: 12 }}>
                {accounts.length} account{accounts.length !== 1 ? 's' : ''} tracked
              </span>
            </div>

            {/* Search */}
            <div style={{ padding: '12px 16px 8px' }}>
              <input
                value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                placeholder="Search accounts..."
                style={{ ...styles.input, background: THEME.surfaceAlt, fontSize: 12 }}
              />
            </div>

            {/* Health Filters */}
            <div style={{ padding: '0 16px 10px', display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              {['All', ...HEALTH_STATUSES].map(h => {
                const count = h === 'All' ? accounts.length : (healthCounts[h] || 0);
                const active = filterHealth === h;
                return (
                  <button key={h} onClick={() => setFilterHealth(h)} style={{
                    fontFamily: 'Inter, sans-serif', fontWeight: 500, fontSize: 9, letterSpacing: '0.04em',
                    padding: '3px 8px', borderRadius: 3, cursor: 'pointer', transition: 'all 0.15s',
                    textTransform: 'uppercase',
                    background: active ? (h === 'All' ? THEME.primary : healthColor(h) + '30') : 'transparent',
                    color: active ? (h === 'All' ? THEME.text : healthColor(h)) : THEME.textMuted,
                    border: `1px solid ${active ? (h === 'All' ? THEME.primary : healthColor(h)) : THEME.border}`,
                  }}>
                    {h} {count > 0 && <span style={{ opacity: 0.7 }}>({count})</span>}
                  </button>
                );
              })}
            </div>

            {/* Account List */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 6 }}>
              {filtered.map(a => (
                <AccountCard key={a.id} account={a} selected={a.id === selectedId} onClick={() => setSelectedId(a.id)} />
              ))}
              {filtered.length === 0 && (
                <div style={{ textAlign: 'center', padding: 30, color: THEME.textMuted, fontSize: 12 }}>
                  {accounts.length === 0 ? 'No accounts yet.' : 'No matches.'}
                </div>
              )}
            </div>

            {/* Add / Import Buttons */}
            <div style={{ padding: 16, borderTop: `1px solid ${THEME.border}`, display: 'flex', flexDirection: 'column', gap: 6 }}>
              <button onClick={() => setShowNewModal(true)} style={styles.addBtn}>+ New Account</button>
              <button onClick={() => setShowImportModal(true)} style={{ ...styles.addBtn, background: 'transparent', border: `1px solid ${THEME.primary}`, color: THEME.primary }}>↑ Import from Docs</button>
            </div>
          </div>

          {/* ── Right Detail Panel ── */}
          <div style={styles.mainArea}>
            {selectedAccount ? (
              <AccountDetail
                account={selectedAccount}
                onUpdate={updateAccount}
                onDelete={deleteAccount}
                onClose={() => setSelectedId(null)}
                engagementTypes={engagementTypes}
              />
            ) : (
              <AggregateTodoView accounts={accounts} onSelectAccount={setSelectedId} />
            )}
          </div>

          {/* ── New Account Modal ── */}
          {showNewModal && <NewAccountModal onSave={addAccount} onClose={() => setShowNewModal(false)} engagementTypes={engagementTypes} onAddEngagementType={addEngagementType} />}
          {showImportModal && <ImportModal onImport={handleImport} onClose={() => setShowImportModal(false)} />}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════
       STYLES
       ══════════════════════════════════════════════════════════════════ */
    const styles = {
      appRoot: {
        display: 'flex',
        height: '100vh',
        fontFamily: 'Inter, Arial, sans-serif',
        color: THEME.text,
        background: THEME.bg,
      },
      sidebar: {
        width: 320,
        minWidth: 320,
        background: THEME.surface,
        borderRight: `1px solid ${THEME.border}`,
        display: 'flex',
        flexDirection: 'column',
        height: '100vh',
        overflow: 'hidden',
      },
      mainArea: {
        flex: 1,
        display: 'flex',
        height: '100vh',
        overflow: 'hidden',
      },
      detailPanel: {
        flex: 1,
        display: 'flex',
        flexDirection: 'column',
        padding: '20px 28px',
        overflow: 'hidden',
        height: '100vh',
      },
      emptyState: {
        flex: 1,
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        opacity: 0.6,
      },
      addBtn: {
        fontFamily: 'Inter, sans-serif', fontWeight: 600, fontSize: 12,
        background: THEME.primary, color: THEME.text, border: 'none',
        borderRadius: 4, padding: '10px 0', cursor: 'pointer',
        letterSpacing: '0.04em', width: '100%',
        transition: 'background 0.15s',
      },
      tabBar: {
        display: 'flex', gap: 0, borderBottom: `1px solid ${THEME.border}`, marginBottom: 0,
      },
      tabBtn: {
        fontFamily: 'Inter, sans-serif', fontWeight: 500, fontSize: 11,
        letterSpacing: '0.06em', textTransform: 'uppercase',
        background: 'none', border: 'none', cursor: 'pointer',
        padding: '8px 16px', transition: 'all 0.15s',
      },
      input: {
        fontFamily: 'Inter, sans-serif', fontWeight: 400, fontSize: 13,
        color: THEME.text, background: THEME.surface,
        border: `1px solid ${THEME.border}`, borderRadius: 4,
        padding: '8px 10px', width: '100%', outline: 'none',
        display: 'block', marginBottom: 4,
      },
      select: {
        fontFamily: 'Inter, sans-serif', fontWeight: 400, fontSize: 11,
        color: THEME.text, background: THEME.surface,
        border: `1px solid ${THEME.border}`, borderRadius: 4,
        padding: '4px 8px', outline: 'none', cursor: 'pointer',
        colorScheme: 'dark',
      },
      label: {
        fontFamily: 'Inter, sans-serif', fontWeight: 500, fontSize: 10,
        letterSpacing: '0.08em', color: THEME.textMuted, textTransform: 'uppercase',
        display: 'block', marginBottom: 4, marginTop: 12,
      },
      tableHeader: {
        fontSize: 9, fontWeight: 600, letterSpacing: '0.1em',
        color: THEME.textMuted, textTransform: 'uppercase', paddingBottom: 6,
        borderBottom: `1px solid ${THEME.border}`,
      },
      editBtn: {
        fontFamily: 'Inter, sans-serif', fontWeight: 600, fontSize: 11,
        background: 'transparent', color: THEME.primary,
        border: `1px solid ${THEME.primary}`, borderRadius: 4,
        padding: '6px 14px', cursor: 'pointer', letterSpacing: '0.04em',
      },
      saveBtn: {
        fontFamily: 'Inter, sans-serif', fontWeight: 600, fontSize: 12,
        background: THEME.primary, color: THEME.text, border: 'none',
        borderRadius: 4, padding: '8px 20px', cursor: 'pointer',
      },
      cancelBtn: {
        fontFamily: 'Inter, sans-serif', fontWeight: 500, fontSize: 12,
        background: 'none', border: `1px solid ${THEME.border}`,
        color: THEME.textSecondary, borderRadius: 4, padding: '8px 16px', cursor: 'pointer',
      },
      smallBtn: {
        fontFamily: 'Inter, sans-serif', fontWeight: 600, fontSize: 10,
        color: THEME.text, border: 'none', borderRadius: 3,
        padding: '4px 10px', cursor: 'pointer', letterSpacing: '0.04em',
      },
      iconBtn: {
        background: 'none', border: 'none', color: THEME.textSecondary,
        cursor: 'pointer', fontSize: 14, padding: '2px 4px', opacity: 0.6,
        transition: 'opacity 0.15s',
      },
      overlay: {
        position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)',
        display: 'flex', justifyContent: 'center', alignItems: 'center', zIndex: 1000,
      },
      modal: {
        background: THEME.surfaceAlt, border: `1px solid ${THEME.border}`,
        borderRadius: 6, padding: '24px 28px', width: '100%', maxWidth: 520,
        maxHeight: '90vh', overflowY: 'auto',
      },
      previewRow: {
        display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
        padding: '6px 0', borderBottom: `1px solid ${THEME.border}`,
      },
      previewLabel: {
        fontWeight: 600, fontSize: 10, letterSpacing: '0.06em',
        color: THEME.textMuted, textTransform: 'uppercase', minWidth: 120,
      },
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
